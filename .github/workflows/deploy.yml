name: Deploy to NAS

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to NAS via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.NAS_HOST }}
        username: ${{ secrets.NAS_USER }}
        password: ${{ secrets.NAS_PASSWORD }}
        port: 22
        script: |
          cd /volume1/docker/aitriplan
          
          # 备份当前版本
          if [ -d "apps" ]; then
            tar czf backup/$(date +%Y%m%d_%H%M%S).tar.gz apps/ docker/ docker-compose.yml package*.json 2>/dev/null || true
          fi
          
          # 拉取最新代码
          git fetch origin
          git reset --hard origin/main
          
          # 安装依赖并构建
          npm ci
          cd apps/web && npx prisma generate && cd ../..
          
          # 重启 Docker 服务
          docker-compose down
          docker-compose up -d --build
          
          # 执行数据库迁移
          sleep 10
          docker-compose exec -T web npx prisma migrate deploy || true
          
          # 清理旧备份（保留最近5个）
          cd backup && ls -t | tail -n +6 | xargs rm -rf 2>/dev/null || true
          
          echo "部署完成！"
